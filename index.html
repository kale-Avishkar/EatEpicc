<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <!--
    viewport-fit=cover: respect iPhone notch
    theme-color: browser chrome matches brand
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
  <meta name="theme-color" content="#E8650A" />
  <meta name="description" content="EatEpic — India's home kitchen platform. Connecting home chefs with working professionals for authentic, subscription-based home-cooked meals. Pre-launch 2025." />
  <title>EatEpic — India's Home Kitchen Platform</title>

  <!--
    Resource hints — tell the browser to open TCP connections early.
    This saves ~150-300ms of DNS + TLS handshake on first font load.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

  <!--
    Font: display=swap prevents invisible text during font load.
    Only load weights actually used in the design.
  -->
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
    rel="stylesheet"
  />

  <!--
    Critical CSS hint: tell browser this page uses GPU compositing.
    Prevents the compositor from waiting for the main thread.
  -->
  <style>
    /* Painted immediately — prevents layout shift flash */
    html { background: #FDFAF6; }
    body { margin: 0; }
    #root { min-height: 100vh; }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
